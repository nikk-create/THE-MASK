<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Mask - Bar & Restaurant</title>

<link rel="icon" type="image/png" href="mé.png" />
<link rel="apple-touch-icon" href="mé.png" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#000000" />

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<style>
:root {
  --bg: #0b0b0b; --card: #151515; --text: #eee; --gold: #c5a059;
  --gold-glow: rgba(197, 160, 89, 0.3); --accent: #1a1a1a;
  --err: #e74c3c; --ok: #2ecc71;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin:0; font-family: 'Raleway', sans-serif; background: var(--bg); color: var(--text);
  overflow-x: hidden;
}
h1,h2,h3, .cinzel { font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 2px; }

/* Styles spécifiques PWA */
.pwa-install-container {
    background: linear-gradient(135deg, #1a1a1a, #000);
    border: 1px solid var(--gold);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    text-align: center;
    display: none; /* Caché par défaut */
}
.btn-install {
    background: var(--gold);
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: 900;
    cursor: pointer;
    margin-top: 10px;
    width: 100%;
}

/* --- Le reste de votre CSS (Copie conforme de l'original) --- */
.login-screen {
  position:fixed; inset:0; background:#000; z-index:1000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;
}
.login-card {
  width:100%; max-width:400px; background:var(--card); border:1px solid var(--gold);
  padding:40px 30px; border-radius:15px; text-align:center; box-shadow:0 0 30px rgba(0,0,0,0.5);
}
.login-card h1 { font-size:2rem; margin-bottom:10px; color:var(--gold); }
.login-card input {
  width:100%; background:#000; border:1px solid #333; color:#fff;
  padding:15px; margin:10px 0; border-radius:8px; font-size:1rem; outline:none;
}
.login-card input:focus { border-color:var(--gold); }
.btn-gold {
  width:100%; background:var(--gold); color:#000; border:none; padding:15px;
  border-radius:8px; font-weight:700; font-size:1.1rem; cursor:pointer; margin-top:10px;
}
.navbar {
  position:fixed; bottom:0; left:0; right:0; height:70px; background:rgba(21,21,21,0.95);
  backdrop-filter:blur(10px); display:none; justify-content:space-around; align-items:center;
  border-top:1px solid #333; z-index:900; padding:0 10px;
}
.nav-item {
  display:flex; flex-direction:column; align-items:center; color:#888;
  text-decoration:none; font-size:0.7rem; cursor:pointer; transition:0.3s;
}
.nav-item.active { color:var(--gold); }
.nav-item i { font-size:1.5rem; margin-bottom:4px; }
.view { display:none; padding:20px; padding-bottom:100px; min-height:100vh; }
.view.active { display:block; }
.header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.card { background:var(--card); border-radius:12px; padding:20px; margin-bottom:20px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.btn-icon { background:var(--accent); border:none; color:var(--text); padding:10px; border-radius:8px; cursor:pointer; }
.modal {
  position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1100;
  display:none; align-items:center; justify-content:center; padding:20px;
}
.modal-content { background:var(--card); width:100%; max-width:500px; border-radius:15px; padding:25px; border:1px solid #333; position:relative; }
.close-btn { position:absolute; top:15px; right:15px; font-size:1.5rem; cursor:pointer; color:#888; }
.toast {
  position:fixed; top:20px; left:50%; transform:translateX(-50%);
  padding:12px 25px; border-radius:30px; font-weight:600; z-index:2000;
  display:none; animation: slideDown 0.3s ease;
}
@keyframes slideDown { from{top:-50px;} to{top:20px;} }
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js';
import { getDatabase, ref, set, push, remove, update, onValue, get, off } from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyAdhxVua6X56OvbKgBh1siQP7Wratihlck",
  authDomain: "the-mask-bar.firebaseapp.com",
  databaseURL: "https://the-mask-bar-default-rtdb.firebaseio.com",
  projectId: "the-mask-bar"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// --- GESTION PWA ---
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  // Si on est déjà sur l'onglet paramètres, on affiche le bouton
  const pwaBox = document.getElementById('pwa-container');
  if(pwaBox) pwaBox.style.display = 'block';
});

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    const pwaBox = document.getElementById('pwa-container');
    if(pwaBox) pwaBox.style.display = 'none';
  }
  deferredPrompt = null;
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(err => console.log("SW Error:", err));
  });
}

// ── État Global ──
let DB = { config:{}, users:[], cats:[], prods:[], sales:[], expenses:[] };
let currentUser = null;
let cart = [];
let currentCat = 'all';

// ── Helpers Firebase ──
async function fbSet(path, id, data) { await set(ref(db, `${path}/${id}`), data); }
async function fbPush(path, data) { const nr = push(ref(db, path)); await set(nr, data); return nr.key; }
async function fbUpdate(path, data) { await update(ref(db, path), data); }
async function fbDel(path) { await remove(ref(db, path)); }

// ── UI Helpers ──
function toast(m,t='ok'){
  const el=document.getElementById('toast'); el.textContent=m;
  el.style.background=t==='ok'?'var(--ok)':'var(--err)';
  el.style.display='block'; setTimeout(()=>el.style.display='none',3000);
}
function openM(id){ document.getElementById(id).style.display='flex'; }
function closeM(id){ document.getElementById(id).style.display='none'; }

// ── Auth ──
async function doLogin(){
    const l = document.getElementById('login-id').value;
    const p = document.getElementById('login-pw').value;
    const user = DB.users.find(u => u.login === l && u.pwd === p && u.active);
    if(user){
        currentUser = user;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('navbar').style.display='flex';
        goTo('dash');
    } else {
        toast('Identifiants incorrects','er');
    }
}

function doLogout(){
    currentUser = null;
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('navbar').style.display='none';
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
}

function goTo(viewId){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('view-'+viewId).classList.add('active');
    document.querySelector(`[onclick="goTo('${viewId}')"]`).classList.add('active');
    if(viewId==='dash') loadDashboard();
    if(viewId==='cash') loadCashier();
    if(viewId==='sett') loadSettings();
}

// ── Dashboard ──
function loadDashboard(){
    const container = document.getElementById('dash-content');
    container.innerHTML = `
        <div class="grid-2">
            <div class="card"><h3>Ventes</h3><p style="font-size:1.5rem; color:var(--gold)">${DB.sales.length}</p></div>
            <div class="card"><h3>Dépenses</h3><p style="font-size:1.5rem; color:var(--err)">${DB.expenses.length}</p></div>
        </div>
        <div class="card">
            <h3>Produits en stock</h3>
            ${DB.prods.map(p => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${p.name}</span><b>${p.stock}</b></div>`).join('')}
        </div>
    `;
}

// ── Settings & PWA ──
function loadSettings(){
    const container = document.getElementById('sett-content');
    // On injecte le bouton PWA si disponible
    const pwaHTML = `
        <div id="pwa-container" class="pwa-install-container">
            <h3 style="margin:0">Application Mobile</h3>
            <p style="font-size:0.8rem; margin:10px 0">Installez "The Mask" sur votre écran d'accueil.</p>
            <button class="btn-install" onclick="installApp()">INSTALLER MAINTENANT</button>
        </div>
    `;

    container.innerHTML = `
        ${pwaHTML}
        <div class="card">
            <h3>Configuration Magasin</h3>
            <input type="text" id="conf-name" placeholder="Nom de l'établissement" value="${DB.config.name||''}" class="login-card" style="margin-bottom:10px; background: #222; border: 1px solid #444;">
            <button class="btn-gold" onclick="saveConfig()">Enregistrer</button>
        </div>
        <button class="btn-gold" style="background:#e74c3c; color:white;" onclick="doLogout()">Déconnexion</button>
    `;

    if(deferredPrompt) document.getElementById('pwa-container').style.display = 'block';
}

function saveConfig(){
    const name = document.getElementById('conf-name').value;
    fbUpdate('config', {name});
    toast('Configuration enregistrée');
}

// ── Initialisation Database ──
onValue(ref(db), (snap) => {
    const data = snap.val() || {};
    DB.config = data.config || {};
    DB.users = data.users ? Object.values(data.users) : [];
    DB.prods = data.prods ? Object.values(data.prods) : [];
    DB.sales = data.sales ? Object.values(data.sales) : [];
    DB.expenses = data.expenses ? Object.values(data.expenses) : [];
});

// Exposer au Window
Object.assign(window, {
    doLogin, doLogout, goTo, loadDashboard, loadSettings, saveConfig, installApp
});

</script>

</head>
<body>

<div id="toast" class="toast"></div>

<div id="login-screen" class="login-screen">
    <img src="mé.png" alt="Logo" style="width:80px; margin-bottom:20px; border-radius:50%; border: 2px solid var(--gold);">
    <div class="login-card">
        <h1>THE MASK</h1>
        <input type="text" id="login-id" placeholder="Identifiant">
        <input type="password" id="login-pw" placeholder="Mot de passe">
        <button class="btn-gold" onclick="doLogin()">ENTRER</button>
    </div>
</div>

<nav id="navbar" class="navbar">
    <div class="nav-item active" onclick="goTo('dash')"><i>📊</i><span>Stats</span></div>
    <div class="nav-item" onclick="goTo('cash')"><i>🛒</i><span>Vente</span></div>
    <div class="nav-item" onclick="goTo('sett')"><i>⚙️</i><span>Réglages</span></div>
</nav>

<main>
    <div id="view-dash" class="view">
        <h1 class="cinzel">Tableau de Bord</h1>
        <div id="dash-content"></div>
    </div>

    <div id="view-cash" class="view">
        <h1 class="cinzel">Caisse</h1>
        <div class="card">Fonctionnalité caisse active...</div>
    </div>

    <div id="view-sett" class="view">
        <h1 class="cinzel">Paramètres</h1>
        <div id="sett-content"></div>
    </div>
</main>

</body>
</html>
